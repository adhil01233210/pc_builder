{% extends 'base.html' %}

{% block title %}Login - Overclock Kawaii Shop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
    <!-- Cute Container -->
    <div class="bg-white rounded-3xl border-4 border-[#FFD1DC] p-8 shadow-lg">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-[#DE6FA1] mb-2">Welcome Back! 🥰</h2>
            <p class="text-sm text-[#88747A]">Ready to build some magical custom rigs?</p>
        </div>

        <!-- Static Form (We will wire up the backend logic later!) -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <!-- Username Input -->
            <div>
                <label class="block text-sm font-bold text-[#5C4B51] mb-2 pl-1">Username 🌸</label>
                <input type="text" name="username" placeholder="Enter your username..." 
                       class="w-full px-4 py-3 bg-[#FFF5F5] rounded-2xl border-2 border-[#FFD1DC] focus:outline-none focus:border-[#DE6FA1] text-[#5C4B51] transition-colors duration-200">
            </div>

            <!-- Password Input -->
            <div>
                <label class="block text-sm font-bold text-[#5C4B51] mb-2 pl-1">Password 🔐</label>
                <input type="password" name="password" placeholder="Enter your secret password..." 
                       class="w-full px-4 py-3 bg-[#FFF5F5] rounded-2xl border-2 border-[#FFD1DC] focus:outline-none focus:border-[#DE6FA1] text-[#5C4B51] transition-colors duration-200">
            </div>

            <!-- Login Button -->
            <button type="submit" 
                    class="w-full bg-[#DE6FA1] hover:bg-[#FFB7B2] text-white font-bold py-3 px-4 rounded-full border-b-4 border-[#B85383] hover:border-[#E89E99] active:scale-95 transition-all duration-150 shadow-md mt-4">
                Log In ✨
            </button>
        </form>

        <!-- Redirect Link -->
        <div class="text-center mt-6 pt-4 border-t border-dashed border-[#FFD1DC]">
            <p class="text-sm text-[#88747A]">
                New to the shop? 
                <a href="{% url 'register' %}" class="text-[#DE6FA1] font-bold hover:underline ml-1">Create an account here! 👉👈</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
